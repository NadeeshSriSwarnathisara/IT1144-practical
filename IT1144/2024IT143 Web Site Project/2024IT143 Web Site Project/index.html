<html>

	<head>
		
		<title>homepage</title>
		<link rel="stylesheet" href="styles.css">
	</head>
	<body>
		<div class="page-content">
			<header class="site-header">
				<div class="container header-inner">
					<div class="brand-link">
						<img src="logo.png" alt="CoffeeShop logo" class="logo">
						<h1 class="brand">CoffeeShop</h1>
					</div>
					<nav class="nav">
						<a href="index.html">Home</a>
						<a href="menu.html">Menu</a>
						<a href="about.html">About</a>
						<a href="contact.html">Contact</a>
					</nav>
					<button id="cart-btn" class="cart-btn">Cart (<span id="cart-count">0</span>)</button>
				</div>
			</header>
			<main>
				
				<section id="branches" class="container branchessection">
					<h3>Our Branches</h3>
					<div class="branches-grid">
						<article class="branch-card">
							<img src="Unknown3.jpg" alt="Galle branch">
							<div class="branch-info"><h4>Galle</h4></div>
						</article>
						<article class="branch-card">
							<img src="Unknown4.jpg" alt="Colombo branch">
							<div class="branch-info"><h4>Colombo</h4></div>
						</article>
						<article class="branch-card">
							<img src="Unknown5.jpg" alt="Kurunegala branch">
							<div class="branch-info"><h4>Kurunegala</h4></div>
						</article>
						<article class="branch-card">
							<img src="Unknown6.jpg" alt="Kalutara branch">
							<div class="branch-info"><h4>Kalutara</h4></div>
						</article>
						<article class="branch-card">
							<img src="Unknown7.jpg" alt="Gampaha branch">
							<div class="branch-info"><h4>Gampaha</h4></div>
						</article>
						<article class="branch-card">
							<img src="images2.jpeg" alt="Matara branch">
							<div class="branch-info"><h4>Matara</h4></div>
						</article>
					</div>
				</section>
			</main>
			<div id="cart-modal" class="cart-modal hidden">
				<div class="cart-panel">
					<header class="cart-header">
						<h4>Your Cart</h4>
						<button id="close-cart" class="close">Close</button>
					</header>
					<div id="cart-items" class="cart-items"></div>
					<div id="payment-form" class="payment-form hidden">
						<h5>Payment Details</h5>
						<div class="payment-field">
							<label for="card-name">Cardholder Name <span class="required">*</span></label>
							<input id="card-name" type="text" name="cardholder_name" placeholder="Name on card" required autocomplete="cc-name" aria-required="true" aria-describedby="card-name-error" />
							<span class="form-error" id="card-name-error"></span>
						</div>
						<div class="payment-field">
							<label for="customer-address">Delivery Address <span class="required">*</span></label>
							<input id="customer-address" type="text" name="delivery_address" placeholder="Street, city, zip" required autocomplete="street-address" aria-required="true" aria-describedby="address-error" />
							<span class="form-error" id="address-error"></span>
						</div>
						<div class="payment-field">
							<label for="card-number">Card Number <span class="required">*</span></label>
							<input id="card-number" type="text" name="card_number" placeholder="1234 5678 9012 3456" maxlength="19" required inputmode="numeric" autocomplete="cc-number" aria-required="true" aria-describedby="card-number-error" />
							<span class="form-error" id="card-number-error"></span>
						</div>
						<div class="payment-row">
							<div class="payment-field small">
								<label for="card-expiry">Expiry <span class="required">*</span></label>
								<input id="card-expiry" type="text" name="card_expiry" placeholder="MM/YY" maxlength="5" required inputmode="numeric" autocomplete="cc-exp" aria-required="true" aria-describedby="expiry-error" />
								<span class="form-error" id="expiry-error"></span>
							</div>
							<div class="payment-field small">
								<label for="card-cvv">CVV <span class="required">*</span></label>
								<input id="card-cvv" type="text" name="card_cvv" placeholder="123" maxlength="4" required inputmode="numeric" autocomplete="cc-csc" aria-required="true" aria-describedby="cvv-error" />
								<span class="form-error" id="cvv-error"></span>
							</div>
						</div>
					</div>
					<div class="cart-footer">
						<div class="totals">Total: Rs <span id="cart-total">0.00</span></div>
						<div class="cart-buttons">
							<button id="clear-cart" class="btn clear-btn">Clear</button>
							<button id="checkout" class="btn checkout-btn">Checkout</button>
						</div>
					</div>
				</div>
			</div>
			<footer class="site-footer">
				<div class="container footer-inner">
					<div>
						<h4>Contact</h4>
						<p>Email: nadeeshsri2005swarnathisara@gmail.com</p>
						<p>Phone: 0763929154</p>
					</div>
					
			</footer>
		</div>
		<script src="script.js"></script>
	</body>
	</html>
