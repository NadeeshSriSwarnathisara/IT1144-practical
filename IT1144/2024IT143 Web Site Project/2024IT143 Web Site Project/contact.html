<html>

<head>

  <title>Contact</title>
  <style>
    :root { --bg: #f7efe4; --text: #432b1f; --accent: #a56d3c; --muted: #6f552f; }
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, Arial, sans-serif; background: var(--bg); color: var(--text); }
    .wrapper { width: min(100%, 1100px); margin: 0 auto; padding: 1.25rem; }
    .site-header { background: #fff; border-bottom: 1px solid #e8d7c8; }
    .header-row { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; }
    .brand-link { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: inherit; }
    .logo { width: 42px; height: 42px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
    .brand-name { margin: 0; font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .nav { display: flex; flex-wrap: wrap; gap: 1rem; }
    .nav-link { color: var(--text); text-decoration: none; font-weight: 600; }
    .nav-link:hover { color: var(--accent); }
    .hero { padding: 2.5rem 0 1.5rem; }
    .hero-panel { background: #fff; border-radius: 20px; padding: 2rem; box-shadow: 0 24px 60px rgba(0,0,0,0.08); }
    .eyebrow { margin: 0 0 0.75rem; font-size: 0.85rem; letter-spacing: 0.12em; color: var(--accent); text-transform: uppercase; }
    .hero-title { margin: 0 0 0.75rem; font-size: clamp(1.9rem, 2.4vw, 2.6rem); }
    .hero-text { margin: 0; color: var(--muted); line-height: 1.8; }
    .content-section { display: grid; grid-template-columns: 1fr 320px; gap: 2rem; align-items: start; padding: 2rem 0 3rem; }
    .form-panel { display: grid; gap: 1rem; padding: 1.75rem; border-radius: 20px; background: #fff; box-shadow: 0 24px 60px rgba(0,0,0,0.08); }
    .form-title { margin: 0; font-size: 1.4rem; color: var(--accent); }
    .field-group { display: grid; gap: 0.5rem; }
    .label { font-weight: 700; }
    .input, .textarea { width: 100%; padding: 0.95rem 1rem; border: 1px solid #e6d7c3; border-radius: 14px; background: #faf5f0; color: var(--text); font: inherit; }
    .textarea { min-height: 160px; resize: vertical; }
    .button { border: none; border-radius: 14px; padding: 0.95rem 1.2rem; background: linear-gradient(135deg, var(--accent), #8f5b31); color: #fff; font-weight: 700; cursor: pointer; }
    .button:hover { opacity: 0.95; }
    .image-panel { display: flex; align-items: center; justify-content: center; }
    .image { width: 100%; max-width: 300px; border-radius: 20px; box-shadow: 0 24px 60px rgba(0,0,0,0.1); }
    .site-footer { background: #fff; border-top: 1px solid #e8d7c8; padding: 1.5rem 0; }
    .footer-grid { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 1.5rem; }
    .footer-heading { margin: 0 0 0.75rem; color: var(--accent); }
    .footer-text { margin: 0.35rem 0; color: var(--muted); }
    @media (max-width: 860px) { .content-section { grid-template-columns: 1fr; } }
    @media (max-width: 620px) { .header-row { flex-direction: column; align-items: flex-start; } .nav { width: 100%; justify-content: flex-start; } }
  </style>
</head>
<body>
  <div class="wrapper">
    <header class="site-header">
      <div class="header-row">
        <div class="brand-link" role="img" aria-label="CoffeeShop">
          <img src="logo.png" alt="CoffeeShop logo" class="logo">
          <h1 class="brand-name">CoffeeShop</h1>
        </div>
        <nav class="nav">
          <a href="index.html" class="nav-link">Home</a>
          <a href="menu.html" class="nav-link">Menu</a>
          <a href="about.html" class="nav-link">About</a>
          <a href="contact.html" class="nav-link">Contact</a>
        </nav>
      </div>
    </header>
    <main class="contact-page">
    
      <section class="content-section">
        <form class="form-panel" method="POST" novalidate>
          <h3 class="form-title">Customer feedback</h3>
          <div class="field-group">
            <label class="label" for="contact-name">Name <span class="required">*</span></label>
            <input class="input" id="contact-name" name="name" type="text" placeholder="Your full name" required autocomplete="name">
          </div>
          <div class="field-group">
            <label class="label" for="contact-email">Email <span class="required">*</span></label>
            <input class="input" id="contact-email" name="email" type="email" placeholder="your@email.com" required autocomplete="email">
          </div>
          <div class="field-group">
            <label class="label" for="contact-message">Message <span class="required">*</span></label>
            <textarea class="textarea" id="contact-message" name="message" placeholder="Your message here..." rows="5" required></textarea>
          </div>
          <button type="submit" class="button">Submit Message</button>
        </form>
        <div class="image-panel">
          <img src="logo.png" alt="CoffeeShop icon" class="image">
        </div>
      </section>
    </main>
  
     <footer class="site-footer">
				<div class="container footer-inner">
					<div>
						<h4>Contact</h4>
						<p>Email: nadeeshsri2005swarnathisara@gmail.com</p>
						<p>Phone: 0763929154</p>
					</div>
       
    </footer>
  </div>
  <script>
    document.querySelector('.form-panel').addEventListener('submit', function(event) {
      event.preventDefault();
      alert('Message sent. Thank you for reaching out!');
      event.target.reset();
    });
  </script>
</body>
</html>
