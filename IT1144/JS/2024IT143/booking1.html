<html>
<head>
  <title>Hotel Booking Form</title>

</head>
<body>
 
 <form style="border:2px solid black; padding:20px; margin-left: 600px; margin-right: 600px;   border-radius: 12px;  background-color:#ADD8E6;">
 <h2>Hotel Booking Form</h2>
   
  
    <input type="text" id="name" placeholder="Enter Name:"><br>

    <input type="email" id="email"placeholder="Enter Email:" ><br>

   
    <input type="tel" id="phone" placeholder="Enter Phone Number:"><br><br>

    <select id="room" >
      <option value="single">Single Room</option>
      <option value="double">Double Room</option>
      <option value="suite">Suite</option>
    </select><br><br>

   
    <p>Payment Method:</p>
    <input type="radio" id="cash" name="payment" value="cash">
    <label for="cash">Cash</label>

    <input type="radio" id="card" name="payment" value="card">
    <label for="card">Card</label>

    <input type="radio" id="transfer" name="payment" value="transfer">
    <label for="transfer">Online Transfer</label><br><br>


    <button type="submit">Submit</button>
 </form>
</body>
</html>
